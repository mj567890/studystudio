name: Delivery Check

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  delivery-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect project
        run: |
          echo "Detecting project type..."
          echo "  Node (apps/web): $([[ -f apps/web/package.json ]] && echo YES || echo NO)"
          echo "  Python (root):  $([[ -f requirements.txt || -f pyproject.toml ]] && echo YES || echo NO)"

      # ── Node.js (frontend in apps/web/) ──
      - name: Setup Node.js
        if: hashFiles('apps/web/package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install Node dependencies
        if: hashFiles('apps/web/package.json') != ''
        working-directory: apps/web
        run: npm ci

      - name: Node lint
        if: hashFiles('apps/web/package.json') != ''
        working-directory: apps/web
        run: npm run lint --if-present

      - name: Node typecheck
        if: hashFiles('apps/web/package.json') != ''
        working-directory: apps/web
        run: npm run typecheck --if-present

      - name: Node test
        if: hashFiles('apps/web/package.json') != ''
        working-directory: apps/web
        run: npm test --if-present

      - name: Node build
        if: hashFiles('apps/web/package.json') != ''
        working-directory: apps/web
        run: npm run build --if-present

      # ── Python (backend at root) ──
      - name: Setup Python
        if: hashFiles('requirements.txt', 'pyproject.toml') != ''
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        if: hashFiles('requirements.txt') != ''
        run: pip install -r requirements.txt

      - name: Install Python project (Poetry)
        if: hashFiles('pyproject.toml') != ''
        run: pip install -e . || true

      - name: Python tests
        if: hashFiles('requirements.txt') != ''
        run: pytest --co -q || true

      # ── Security ──
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dependency review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
