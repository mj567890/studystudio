# nginx.conf — StudyStudio 前端静态文件服务
# 安全审计 2026-04-27：添加完整安全响应头

server {
    listen 3000;

    # ── 全局安全头 ──────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header X-Download-Options "noopen" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # 内容安全策略 (CSP) — 最后一道 XSS 防线（单行，nginx 不支持多行字符串拼接）
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' http://localhost:* https:; media-src 'self'; frame-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    # index.html：禁止缓存，确保总是加载最新资源引用
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # 带 hash 的静态资源：长期缓存（文件名 hash 即版本号）
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 前端路由 fallback
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # 代理到后端 API（动态 DNS 解析，避免容器重启后 IP 缓存导致 502）
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $api_upstream "api:8000";
        proxy_pass         http://$api_upstream;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 100M;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
    }
}
